name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout catholic-kb subrepo at pinned commit
        shell: bash
        run: |
          COMMIT=$(python3 -c "import json; print(json.load(open('.catholic-kb-commit.json'))['catholic_kb_commit'])")
          git init catholic-kb
          git -C catholic-kb remote add origin https://github.com/kliewerdaniel/catholic-kb.git
          git -C catholic-kb fetch --depth 1 origin "$COMMIT"
          git -C catholic-kb checkout FETCH_HEAD

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS build targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: catholic-kb/src-tauri

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install frontend dependencies
        run: npm install
        working-directory: catholic-kb

      - name: Build ARM64
        run: npx tauri build --target aarch64-apple-darwin
        working-directory: catholic-kb

      - name: Build Intel
        run: npx tauri build --target x86_64-apple-darwin
        working-directory: catholic-kb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            catholic-kb/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            catholic-kb/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
            catholic-kb/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            catholic-kb/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout catholic-kb subrepo at pinned commit
        shell: bash
        run: |
          COMMIT=$(python3 -c "import json; print(json.load(open('.catholic-kb-commit.json'))['catholic_kb_commit'])")
          git init catholic-kb
          git -C catholic-kb remote add origin https://github.com/kliewerdaniel/catholic-kb.git
          git -C catholic-kb fetch --depth 1 origin "$COMMIT"
          git -C catholic-kb checkout FETCH_HEAD

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS build targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: catholic-kb/src-tauri

      - name: Install frontend dependencies
        run: npm install
        working-directory: catholic-kb

      - name: Build
        run: npx tauri build
        working-directory: catholic-kb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            catholic-kb/src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Checkout catholic-kb subrepo at pinned commit
        shell: bash
        run: |
          COMMIT=$(python3 -c "import json; print(json.load(open('.catholic-kb-commit.json'))['catholic_kb_commit'])")
          git init catholic-kb
          git -C catholic-kb remote add origin https://github.com/kliewerdaniel/catholic-kb.git
          git -C catholic-kb fetch --depth 1 origin "$COMMIT"
          git -C catholic-kb checkout FETCH_HEAD

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS build targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: catholic-kb/src-tauri

      - name: Install frontend dependencies
        run: npm install
        working-directory: catholic-kb

      - name: Build
        run: npx tauri build
        working-directory: catholic-kb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            catholic-kb/src-tauri/target/release/bundle/appimage/*.AppImage
            catholic-kb/src-tauri/target/release/bundle/deb/*.deb

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            macos-builds/*
            windows-build/*
            linux-build/*
